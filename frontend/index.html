<!DOCTYPE html>
<html>
<head>
<title>SOS System</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
margin:5px;
background:green;
color:white;
border:none;
}

.card{
background:#1e293b;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>

</head>

<body>

<h1>🚨 SOS Management System</h1>

<h2>Send SOS</h2>

<input id="name" placeholder="Name">
<input id="msg" placeholder="Message">

<button onclick="sendSOS()">Send SOS</button>

<h2>All SOS Requests</h2>

<button onclick="loadSOS()">Load SOS</button>

<div id="sosList"></div>

<script>

// 🔹 SEND SOS
async function sendSOS(){

let name=document.getElementById("name").value.trim()
let msg=document.getElementById("msg").value.trim()

if(name===""||msg===""){
alert("Fill all fields")
return
}

if(msg.length<5){
alert("Message too short")
return
}

await fetch("http://localhost:5000/sos",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name,
message:msg,
location:"User Location"
})
})

alert("SOS Sent")
}

// 🔹 LOAD SOS
async function loadSOS(){

let res=await fetch("http://localhost:5000/sos")
let data=await res.json()

let html=""

data.forEach(d=>{
html+=`
<div class="card">
<b>${d.name}</b><br>
${d.message}<br>
Status: ${d.status}
</div>
`
})

document.getElementById("sosList").innerHTML=html
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Real-Time SOS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#map{
height:400px;
width:90%;
margin:auto;
}

input,button{
padding:10px;
margin:5px;
}

.alert{
color:red;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}
</style>

</head>

<body>

<h1>🚨 Real-Time SOS Dashboard</h1>

<input id="name" placeholder="Name">
<input id="msg" placeholder="Message">
<button onclick="sendSOS()">Send SOS</button>

<div id="map"></div>

<div id="alerts"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🔹 MAP
const map = L.map('map').setView([22,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{x}.png').addTo(map);

let markers = {};

// 🔹 WEBSOCKET
const socket = new WebSocket("ws://localhost:5000");

socket.onmessage = function(event){
    const msg = JSON.parse(event.data);

    if(msg.type==="NEW_SOS"){
        addMarker(msg.data);
    }

    if(msg.type==="UPDATE_SOS"){
        addMarker(msg.data);
    }
};

// 🔹 ADD MARKER
function addMarker(sos){

    if(markers[sos._id]){
        map.removeLayer(markers[sos._id]);
    }

    let color = sos.status==="NEW" ? "red" : "green";

    let marker = L.circleMarker([sos.lat,sos.lon],{
        color:color,
        radius:10
    }).addTo(map);

    marker.bindPopup(`
        <b>${sos.name}</b><br>
        ${sos.message}<br>
        Status: ${sos.status}
    `);

    markers[sos._id]=marker;

    document.getElementById("alerts").innerHTML +=
    `<div class="alert">🚨 ${sos.name}: ${sos.message}</div>`;
}

// 🔹 SEND SOS
async function sendSOS(){

let name=document.getElementById("name").value
let msg=document.getElementById("msg").value

await fetch("http://localhost:5000/sos",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,message:msg})
})

alert("SOS Sent")
}

</script>

</body>
</html>

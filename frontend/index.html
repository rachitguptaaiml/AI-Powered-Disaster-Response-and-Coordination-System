<!DOCTYPE html>
<html>
<head>
    <title>AI Disaster Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 10px;
        }

        #map {
            height: 400px;
            width: 90%;
            margin: 20px auto;
            border-radius: 10px;
        }

        .alert {
            animation: blink 1s infinite;
            color: red;
            font-weight: bold;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>

<body>

<h1>🌍 AI Disaster Response Dashboard</h1>

<div id="map"></div>
<div id="alerts"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

    // 🔹 Initialize Map
    var map = L.map('map').setView([20.5937, 78.9629], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    }).addTo(map);

    let markers = [];

    // 🔹 REAL-TIME AI DATA FETCH (CONNECTED TO YOUR prediction.py)
    async function getDisasterData() {

        try {
            let res = await fetch("http://localhost:8000/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    rainfall: Math.random()*300,
                    wind: Math.random()*100,
                    temperature: Math.random()*45,
                    population: Math.random()*1500,
                    river_level: Math.random()*10
                })
            });

            let ai = await res.json();

            return [
                {
                    location: "Delhi",
                    lat: 28.61,
                    lon: 77.23,
                    severity: ai.data.severity,
                    type: "AI Predicted"
                },
                {
                    location: "Mumbai",
                    lat: 19.07,
                    lon: 72.87,
                    severity: "MEDIUM",
                    type: "Cyclone"
                },
                {
                    location: "Assam",
                    lat: 26.20,
                    lon: 92.93,
                    severity: "HIGH",
                    type: "Flood"
                }
            ];

        } catch (error) {

            // 🔥 FALLBACK DATA (if backend not running)
            return [
                {
                    location: "Delhi",
                    lat: 28.61,
                    lon: 77.23,
                    severity: "HIGH",
                    type: "Flood"
                },
                {
                    location: "Mumbai",
                    lat: 19.07,
                    lon: 72.87,
                    severity: "MEDIUM",
                    type: "Cyclone"
                }
            ];
        }
    }

    // 🔹 UPDATE MAP
    async function updateMap() {

        // Remove old markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        let data = await getDisasterData();

        let alertHTML = "";

        data.forEach(d => {

            let color = d.severity.includes("HIGH") ? "red" : "orange";

            let marker = L.circleMarker([d.lat, d.lon], {
                color: color,
                radius: 10
            }).addTo(map);

            marker.bindPopup(
                `<b>${d.location}</b><br>${d.type}<br><b>${d.severity}</b>`
            );

            markers.push(marker);

            alertHTML += `<div class="card alert">
                🚨 ${d.type} in ${d.location} - ${d.severity}
            </div>`;
        });

        document.getElementById("alerts").innerHTML = alertHTML;
    }

    // 🔹 AUTO REFRESH EVERY 5 SEC
    setInterval(updateMap, 5000);

    updateMap();

</script>

</body>
</html>

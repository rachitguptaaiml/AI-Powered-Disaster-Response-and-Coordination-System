<!DOCTYPE html>
<html>
<head>
<title>AI Disaster Dashboard</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}
</style>

</head>

<body>

<h1>🚨 AI Disaster Response Dashboard</h1>

<!-- Prediction -->
<div class="card">
<h2>🌧 Predict Disaster</h2>

<input id="rain" placeholder="Rainfall">
<input id="wind" placeholder="Wind Speed">

<button onclick="predict()">Predict</button>

<p id="result"></p>
</div>

<!-- SOS -->
<div class="card">
<h2>🆘 Send SOS</h2>

<input id="name" placeholder="Name">
<input id="msg" placeholder="Message">

<button onclick="sendSOS()">Send</button>
</div>

<!-- View SOS -->
<div class="card">
<h2>📊 View SOS Requests</h2>

<button onclick="loadSOS()">Load Data</button>

<pre id="sosData"></pre>
</div>

<!-- Map -->
<div class="card">
<h2>🗺️ Live Disaster Map</h2>

<iframe 
src="https://maps.google.com/maps?q=india&t=&z=5&ie=UTF8&iwloc=&output=embed"
width="100%" height="300">
</iframe>

</div>

<!-- Graph -->
<div class="card">
<h2>📈 Prediction Statistics</h2>

<canvas id="chart"></canvas>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// 🔥 AI Prediction
async function predict(){

let rain = document.getElementById("rain").value
let wind = document.getElementById("wind").value

let res = await fetch("http://127.0.0.1:8000/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({rainfall:rain,wind:wind})
})

let data = await res.json()

document.getElementById("result").innerText =
"⚠ Severity: " + data.severity
}

// 🚨 Send SOS
async function sendSOS(){

let name = document.getElementById("name").value
let msg = document.getElementById("msg").value

await fetch("http://localhost:5000/sos",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,msg})
})

alert("✅ SOS Sent Successfully")
}

// 📊 Load SOS
async function loadSOS(){

let res = await fetch("http://localhost:5000/sos")
let data = await res.text()

document.getElementById("sosData").innerText = data
}

// 📈 Chart
const ctx = document.getElementById('chart');

new Chart(ctx, {
type: 'bar',
data: {
labels: ['Low','Medium','High'],
datasets: [{
label: 'Disaster Predictions',
data: [5, 10, 7],
borderWidth: 1
}]
},
options: {
scales: {
y: {
beginAtZero: true
}
}
}
});

</script>

</body>
</html>

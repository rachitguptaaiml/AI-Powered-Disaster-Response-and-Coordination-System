<!DOCTYPE html>
<html>
<head>
<title>AI Disaster Dashboard</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* Toast */
#toast{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:15px;
border-radius:8px;
display:none;
}

/* Popup */
#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1e293b;
padding:30px;
border-radius:10px;
display:none;
}

/* Blinking alert */
.alert{
color:red;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}
</style>

</head>

<body>

<h1>🚨 AI Disaster Response Dashboard</h1>

<div class="alert">⚠ LIVE ALERT SYSTEM ACTIVE</div>

<!-- Prediction -->
<div class="card">
<h2>🌧 Predict Disaster</h2>

<input id="rain" placeholder="Rainfall">
<input id="wind" placeholder="Wind Speed">
<input id="temp" placeholder="Temperature">
<input id="pop" placeholder="Population Density">
<input id="river" placeholder="River Level">

<button onclick="predict()">Predict</button>

<p id="result"></p>
</div>

<!-- SOS -->
<div class="card">
<h2>🆘 Send SOS</h2>

<input id="name" placeholder="Name">
<input id="msg" placeholder="Message">

<button onclick="sendSOS(event)">Send</button>

<p id="status"></p>
</div>

<!-- View SOS -->
<div class="card">
<h2>📊 View SOS Requests</h2>

<pre id="sosData"></pre>
</div>

<!-- Map -->
<div class="card">
<h2>🗺️ Live Disaster Map</h2>

<iframe 
src="https://maps.google.com/maps?q=disaster%20zones&t=&z=5&ie=UTF8&iwloc=&output=embed"
width="100%" height="300">
</iframe>

</div>

<!-- Graph -->
<div class="card">
<h2>📈 Prediction Statistics</h2>
<canvas id="chart"></canvas>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Popup -->
<div id="popup">
<h2>✅ SOS Sent Successfully</h2>
<button onclick="closePopup()">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// Toast
function showToast(msg){
let t = document.getElementById("toast")
t.innerText = msg
t.style.display = "block"
setTimeout(()=>{t.style.display="none"},3000)
}

// Popup
function showPopup(){
document.getElementById("popup").style.display="block"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

// Prediction
async function predict(){
let rain = document.getElementById("rain").value
let wind = document.getElementById("wind").value

let res = await fetch("http://127.0.0.1:8000/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({rainfall:rain,wind:wind})
})

let data = await res.json()
document.getElementById("result").innerText = "⚠ Severity: " + data.severity
}

// SOS
async function sendSOS(event){

let name = document.getElementById("name").value.trim()
let msg = document.getElementById("msg").value.trim()

if(name==="" || msg===""){
showToast("❌ Fill all fields")
return
}

if(msg.length<5){
showToast("❌ Message too short")
return
}

let btn = event.target
btn.innerText="Sending..."
btn.disabled=true

try{
await fetch("http://localhost:5000/sos",{
method:"POST",
headers:{
"Content-Type":"application/json",
"authorization":"12345"
},
body:JSON.stringify({name,msg})
})

showToast("✅ SOS Sent")
showPopup()

document.getElementById("status").innerText =
"Sent at " + new Date().toLocaleTimeString()

document.getElementById("name").value=""
document.getElementById("msg").value=""

}catch{
showToast("❌ Error sending SOS")
}

btn.innerText="Send"
btn.disabled=false
}

// Load SOS
async function loadSOS(){
let res = await fetch("http://localhost:5000/sos")
let data = await res.text()
document.getElementById("sosData").innerText = data
}

// Real-time update
setInterval(loadSOS,3000)

// Chart
new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:['Low','Medium','High'],
datasets:[{
label:'Predictions',
data:[5,10,7]
}]
}
})

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>AI Disaster Dashboard</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<h1>🚨 AI Disaster Response Dashboard</h1>

<div class="card">
<h2>🌧 Predict Disaster</h2>

<input id="rain" placeholder="Rainfall">
<input id="wind" placeholder="Wind">

<button onclick="predict()">Predict</button>

<p id="result"></p>
</div>

<div class="card">
<h2>🆘 Send SOS</h2>

<input id="name" placeholder="Name">
<input id="msg" placeholder="Message">

<button onclick="sendSOS()">Send</button>
</div>

<div class="card">
<h2>📊 View SOS</h2>

<button onclick="loadSOS()">Load Data</button>

<pre id="sosData"></pre>
</div>

<div class="card">
<h2>🗺️ Live Map</h2>

<iframe 
src="https://maps.google.com/maps?q=india&t=&z=5&ie=UTF8&iwloc=&output=embed"
width="100%" height="300">
</iframe>

</div>

<div class="card">
<h2>📈 Prediction Stats</h2>

<canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"
  const ctx = document.getElementById('myChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: ['Low', 'Medium', 'High'],
datasets: [{
label: 'Predictions',
data: [5, 10, 7],
borderWidth: 1
}]
},
options: {
scales: {
y: {
beginAtZero: true
}
}
}
});>
</script>

<script>

async function predict(){

let rain = document.getElementById("rain").value
let wind = document.getElementById("wind").value

let res = await fetch("http://127.0.0.1:8000/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({rainfall:rain,wind:wind})
})

let data = await res.json()

document.getElementById("result").innerText =
"Severity: " + data.severity
}

async function sendSOS(){

let name = document.getElementById("name").value
let msg = document.getElementById("msg").value

await fetch("http://localhost:5000/sos",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,msg})
})

alert("SOS Sent")
}

async function loadSOS(){

let res = await fetch("http://localhost:5000/sos")
let data = await res.text()

document.getElementById("sosData").innerText = data
}

// Chart
new Chart(document.getElementById("chart"), {
type: 'bar',
data: {
labels: ['Low','Medium','High'],
datasets: [{
label: 'Predictions',
data: [5,10,7]
}]
}
});

</script>

</body>
</html>
